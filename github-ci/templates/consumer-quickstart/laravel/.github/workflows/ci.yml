# Copy to: .github/workflows/ci.yml
# Laravel: installs PHP/composer tooling via universal-ci runtime; commands use Composer/Pint/Artisan presets.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  universal-ci:
    uses: hao47363/better-dev-ci/.github/workflows/universal-ci.yml@stable
    with:
      tooling_repository: hao47363/better-dev-ci
      tooling_ref: stable
      tooling_auth_mode: none
      runtime: php
      # runtime_version: "8.3"
    secrets: inherit
