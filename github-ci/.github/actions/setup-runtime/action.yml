name: Setup runtime
description: >-
  Optional language runtimes for CI jobs. Steps are guarded by runtime input;
  use runtime "none" (default) to skip all setup.
inputs:
  runtime:
    description: 'One of none, node, php, flutter, python.'
    required: false
    default: none
  runtime_version:
    description: Optional version string for the selected runtime (empty uses a sensible default).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Validate runtime input
      shell: bash
      env:
        RUNTIME: ${{ inputs.runtime }}
      run: |
        set -euo pipefail
        case "${RUNTIME}" in
          none|node|php|flutter|python) ;;
          *)
            echo "Error: unsupported runtime \"${RUNTIME}\"." >&2
            echo "Allowed values: none, node, php, flutter, python" >&2
            exit 1
            ;;
        esac

    # Pinned SHAs (see tags: setup-node v4.0.4, setup-php 2.31.0, flutter-action v2.10.0, setup-python v5.3.0)
    - name: Setup Node.js
      if: ${{ inputs.runtime == 'node' }}
      uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6
      with:
        node-version: ${{ inputs.runtime_version != '' && inputs.runtime_version || 'lts/*' }}

    - name: Setup PHP
      if: ${{ inputs.runtime == 'php' }}
      uses: shivammathur/setup-php@2e947f1f6932d141d076ca441d0e1e881775e95b
      with:
        php-version: ${{ inputs.runtime_version != '' && inputs.runtime_version || '8.2' }}

    - name: Setup Flutter (pinned)
      if: ${{ inputs.runtime == 'flutter' && inputs.runtime_version != '' }}
      uses: subosito/flutter-action@48cafc24713cca54bbe03cdc3a423187d413aafa
      with:
        channel: stable
        flutter-version: ${{ inputs.runtime_version }}

    - name: Setup Flutter (latest stable)
      if: ${{ inputs.runtime == 'flutter' && inputs.runtime_version == '' }}
      uses: subosito/flutter-action@48cafc24713cca54bbe03cdc3a423187d413aafa
      with:
        channel: stable

    - name: Setup Python
      if: ${{ inputs.runtime == 'python' }}
      uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
      with:
        python-version: ${{ inputs.runtime_version != '' && inputs.runtime_version || '3.12' }}
