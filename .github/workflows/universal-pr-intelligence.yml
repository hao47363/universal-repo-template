name: Universal PR intelligence (reusable)

on:
  workflow_call:
    inputs:
      tooling_repository:
        type: string
        description: Repository that hosts root scripts/ and templates/ when not vendored in the app checkout.
        default: hao47363/better-dev-ci
      tooling_ref:
        type: string
        description: Git ref on tooling_repository for the governance pack checkout.
        default: stable
      tooling_auth_mode:
        type: string
        description: pat with GH_CI_REPO_TOKEN for private tooling; none for public.
        default: none
    secrets:
      GH_CI_REPO_TOKEN:
        description: Optional PAT with read access to tooling_repository when tooling_auth_mode is pat.
        required: false

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: universal-pr-intelligence-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-intelligence:
    name: PR Intelligence Report
    runs-on: ubuntu-latest
    steps:
      - name: Setup governance pack
        uses: hao47363/better-dev-ci/.github/actions/setup-governance-pack@stable
        with:
          fetch_depth: "0"
          tooling_repository: ${{ inputs.tooling_repository }}
          tooling_ref: ${{ inputs.tooling_ref }}
          tooling_auth_mode: ${{ inputs.tooling_auth_mode }}
          tooling_token: ${{ secrets.GH_CI_REPO_TOKEN }}

      - name: Read PR intelligence settings
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          echo "enabled=$(sh ./scripts/get_config_value.sh pr_intelligence.enabled true)" >> "$GITHUB_OUTPUT"

      - name: Generate PR report
        if: ${{ steps.cfg.outputs.enabled == 'true' }}
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: bash ./scripts/generate_pr_report.sh pr-report.md

      - name: Upload PR report artifact
        if: ${{ steps.cfg.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-report-pr-${{ github.event.pull_request.number }}
          path: pr-report.md
          if-no-files-found: error

      - name: Upsert PR report comment
        if: ${{ steps.cfg.outputs.enabled == 'true' }}
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          REPORT_PATH: pr-report.md
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- pr-intelligence-report -->';
            const report = fs.readFileSync(process.env.REPORT_PATH, 'utf8');
            const body = `${marker}\n## PR Intelligence Report\n\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );

            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Comment fallback notice
        if: ${{ failure() }}
        run: |
          echo "PR report comment update failed due to token/event restrictions."
          echo "Report artifact is still available in this workflow run."
