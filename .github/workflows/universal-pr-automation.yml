name: Universal PR automation (reusable)

on:
  workflow_call:
    inputs:
      tooling_repository:
        type: string
        description: Repository that hosts root scripts/ and templates/ when not vendored in the app checkout.
        default: hao47363/better-dev-ci
      tooling_ref:
        type: string
        description: Git ref on tooling_repository for the governance pack checkout.
        default: stable
      tooling_auth_mode:
        type: string
        description: pat with GH_CI_REPO_TOKEN for private tooling; none for public.
        default: none
    secrets:
      GH_CI_REPO_TOKEN:
        description: Optional PAT with read access to tooling_repository when tooling_auth_mode is pat.
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Setup governance pack
        uses: hao47363/better-dev-ci/.github/actions/setup-governance-pack@stable
        with:
          fetch_depth: "1"
          tooling_repository: ${{ inputs.tooling_repository }}
          tooling_ref: ${{ inputs.tooling_ref }}
          tooling_auth_mode: ${{ inputs.tooling_auth_mode }}
          tooling_token: ${{ secrets.GH_CI_REPO_TOKEN }}

      - name: Read automation settings
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          echo "enabled=$(sh ./scripts/get_config_value.sh automation.auto_pr_enabled true)" >> "$GITHUB_OUTPUT"
          echo "base_branch=$(sh ./scripts/get_config_value.sh automation.auto_pr_base_branch main)" >> "$GITHUB_OUTPUT"
          echo "branch_types=$(sh ./scripts/get_config_value.sh governance.branch_types feature,feat,fix,chore,docs,refactor,test,perf,ci,build,style,revert)" >> "$GITHUB_OUTPUT"

      - name: Create PR if missing
        if: ${{ steps.cfg.outputs.enabled == 'true' }}
        uses: actions/github-script@v7
        env:
          BASE_BRANCH: ${{ steps.cfg.outputs.base_branch }}
          ALLOWED_BRANCH_TYPES: ${{ steps.cfg.outputs.branch_types }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headBranch = context.ref.replace('refs/heads/', '');
            const baseBranch = process.env.BASE_BRANCH || 'main';
            const allowed = (process.env.ALLOWED_BRANCH_TYPES || '')
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean);
            const branchPrefix = headBranch.split('/')[0];

            if (headBranch === baseBranch) return;
            if (!allowed.includes(branchPrefix)) return;

            const { data: existing } = await github.rest.pulls.list({
              owner, repo, state: 'open',
              head: `${owner}:${headBranch}`,
              base: baseBranch,
            });
            if (existing.length > 0) return;

            const prettify = (segment) =>
              segment
                .split(/[-_]+/)
                .filter(Boolean)
                .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');

            const title = headBranch
              .split('/')
              .map((segment) => prettify(segment))
              .join('/');
            const body = [
              '## Summary',
              '- This pull request was auto-created after pushing a branch that matches the naming policy.',
              '',
              '## Notes',
              '- Update this description with implementation details.',
              '- CI checks will run automatically.'
            ].join('\n');

            const { data: createdPr } = await github.rest.pulls.create({
              owner, repo, head: headBranch, base: baseBranch, title, body
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: createdPr.number,
              body: [
                '@coderabbitai full review',
                '',
                'Please include a **Mermaid sequence diagram** in your review that illustrates the main control or data flow relevant to this pull request (for example: contributor → GitHub → Actions jobs → artifacts/bots, or service call order where the change touches runtime behavior).',
              ].join('\n'),
            });
