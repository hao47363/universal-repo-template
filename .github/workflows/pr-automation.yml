name: Auto Create Pull Request

on:
  push:
    branches:
      - "**"

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read automation settings
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          echo "enabled=$(sh ./scripts/get_config_value.sh automation.auto_pr_enabled true)" >> "$GITHUB_OUTPUT"
          echo "base_branch=$(sh ./scripts/get_config_value.sh automation.auto_pr_base_branch main)" >> "$GITHUB_OUTPUT"
          echo "branch_types=$(sh ./scripts/get_config_value.sh governance.branch_types feature,feat,fix,chore,docs,refactor,test,perf,ci,build,style,revert)" >> "$GITHUB_OUTPUT"

      - name: Create PR if missing
        if: ${{ steps.cfg.outputs.enabled == 'true' }}
        uses: actions/github-script@v7
        env:
          BASE_BRANCH: ${{ steps.cfg.outputs.base_branch }}
          ALLOWED_BRANCH_TYPES: ${{ steps.cfg.outputs.branch_types }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headBranch = context.ref.replace('refs/heads/', '');
            const baseBranch = process.env.BASE_BRANCH || 'main';
            const allowed = (process.env.ALLOWED_BRANCH_TYPES || '')
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean);
            const branchPrefix = headBranch.split('/')[0];

            if (headBranch === baseBranch) return;
            if (!allowed.includes(branchPrefix)) return;

            const { data: existing } = await github.rest.pulls.list({
              owner, repo, state: 'open',
              head: `${owner}:${headBranch}`,
              base: baseBranch,
            });
            if (existing.length > 0) return;

            const title = `${headBranch}: auto-created PR`;
            const body = [
              '## Summary',
              '- This pull request was auto-created after pushing a branch that matches the naming policy.',
              '',
              '## Notes',
              '- Update this description with implementation details.',
              '- CI checks will run automatically.'
            ].join('\n');

            const { data: createdPr } = await github.rest.pulls.create({
              owner, repo, head: headBranch, base: baseBranch, title, body
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: createdPr.number,
              body: '@coderabbitai full review'
            });

