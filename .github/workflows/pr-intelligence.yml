name: PR Intelligence

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-intelligence-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-intelligence:
    name: PR Intelligence Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR head ref
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "pull/${PR_NUMBER}/head:refs/remotes/origin/pr-${PR_NUMBER}-head"

      - name: Generate PR report
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_SHA: refs/remotes/origin/pr-${{ github.event.pull_request.number }}-head
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: sh ./governance-pack/scripts/generate_pr_report.sh pr-report.md

      - name: Upload PR report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-report-pr-${{ github.event.pull_request.number }}
          path: pr-report.md
          if-no-files-found: error

      - name: Upsert PR report comment
        uses: actions/github-script@v7
        env:
          REPORT_PATH: pr-report.md
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- pr-intelligence-report -->';
            const report = fs.readFileSync(process.env.REPORT_PATH, 'utf8');
            const body = `${marker}\n## PR Intelligence Report\n\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );

            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
