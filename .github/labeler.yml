type:docs:
  - changed-files:
      - any-glob-to-any-file: ["**/*.md", "governance-pack/docs/**"]

area:ci:
  - changed-files:
      - any-glob-to-any-file: [".github/workflows/**", "governance-pack/scripts/**", "lefthook.yml"]

area:template:
  - changed-files:
      - any-glob-to-any-file: [".template/**", "governance-pack/docs/README.md"]

area:governance:
  - changed-files:
      - any-glob-to-any-file: [".github/CODEOWNERS", ".github/pull_request_template.md", "governance-pack/docs/governance/**"]
